<!DOCTYPE html>
<html>
<head>
<title>Question Paper Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
}

/* Floating background circles */
.circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    animation: float 8s infinite ease-in-out;
}

.circle1 { width: 150px; height: 150px; top: 10%; left: 10%; }
.circle2 { width: 200px; height: 200px; bottom: 10%; right: 10%; animation-delay: 2s; }

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

/* Hero */
.hero {
    text-align: center;
    padding-top: 80px;
    animation: fadeIn 1s ease-in;
}

.hero h1 {
    font-size: 3rem;
    font-weight: 700;
}

.hero p {
    color: #e0e0e0;
}

/* Glass Card */
.card-box {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    padding: 30px;
    width: 420px;
    margin: 40px auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card-box:hover {
    transform: translateY(-5px);
}

/* Features */
.features {
    margin-top: 50px;
}

.feature-card {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    transition: 0.3s;
}

.feature-card:hover {
    transform: translateY(-8px);
}

.feature-card i {
    font-size: 25px;
    margin-bottom: 10px;
}

/* Button */
.btn-primary {
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    border: none;
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">
    <i class="fa-solid fa-file"></i> QP Generator
  </span>

  <div class="ms-auto">
    <a class="text-white me-3" href="/">Home</a>
    <a class="text-white me-3" href="/input">Generate</a>
    <a class="text-white me-3" href="/templates">Templates</a>
    <a class="text-white" href="/history">History</a>
  </div>
</nav>

<!-- Background animation -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="container hero">

<h1>
<i class="fa-solid fa-file-lines"></i> Smart Question Paper Generator
</h1>

<p class="mb-4">
Create professional exam papers in seconds using intelligent automation
</p>

<!-- Form Card -->
<div class="card-box">

<form action="/input" method="POST">

<label class="form-label mb-2">
<i class="fa-solid fa-layer-group"></i> Select Exam Type
</label>

<select name="exam" class="form-select mb-3">
<option value="cae">CAE</option>
<option value="ese">ESE</option>
<option value="custom">Custom</option>
</select>

<button class="btn btn-primary w-100">
<i class="fa-solid fa-arrow-right"></i> Get Started
</button>

</form>

</div>

<!-- Features -->
<div class="row features text-center">

<div class="col-md-4 mb-3">
<div class="feature-card">
<i class="fa-solid fa-bolt"></i>
<h6>Fast Generation</h6>
<p>Generate papers instantly</p>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="feature-card">
<i class="fa-solid fa-file"></i>
<h6>Multiple Formats</h6>
<p>Supports PDF, DOCX & Images</p>
</div>
</div>

<div class="col-md-4 mb-3">
<div class="feature-card">
<i class="fa-solid fa-sliders"></i>
<h6>Custom Templates</h6>
<p>Flexible paper formats</p>
</div>
</div>

</div>

</div>

</body>
</html>
