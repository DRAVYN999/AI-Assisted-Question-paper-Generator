<!DOCTYPE html>
<html>
<head>
<title>Manual Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}
.card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">
    <i class="fa-solid fa-file"></i> QP Generator
  </span>

  <div class="ms-auto">
    <a class="text-white me-3" href="/">Home</a>
    <a class="text-white me-3" href="/input">Generate</a>
    <a class="text-white me-3" href="/templates">Templates</a>
    <a class="text-white" href="/history">History</a>
  </div>
</nav>

<div class="container mt-5">

<h2 class="text-center mb-4">Enter Questions</h2>

<form action="/generate_manual" method="POST" enctype="multipart/form-data">

<div class="card mb-3">
<h4>Unit 1</h4>
<input name="unit1" class="form-control mb-2">
<input name="unit1" class="form-control mb-2">
<input name="unit1" class="form-control mb-2">
<input name="unit1" class="form-control mb-2">
</div>

<div class="card mb-3">
<h4>Unit 2</h4>
<input name="unit2" class="form-control mb-2">
<input name="unit2" class="form-control mb-2">
<input name="unit2" class="form-control mb-2">
<input name="unit2" class="form-control mb-2">
</div>

<div class="card mb-3">
<input type="file" name="template" class="form-control">
</div>

<button class="btn btn-primary w-100">Generate Paper</button>

</form>

</div>

</body>
</html>
