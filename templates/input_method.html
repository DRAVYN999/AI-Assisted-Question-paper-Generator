<!DOCTYPE html>
<html>
<head>
<title>Choose Input Method</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    margin: 0;
}

/* Navbar */
.navbar {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
}

.navbar a {
    text-decoration: none;
    font-weight: 500;
}

.navbar a:hover {
    opacity: 0.7;
}

/* Center content */
.main-content {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
    flex-direction: column;
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* Cards layout */
.cards {
    display: flex;
    gap: 30px;
    margin-top: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    padding: 30px;
    width: 260px;
    transition: 0.3s;
    color: white;
}

.card:hover {
    transform: translateY(-8px);
}

.card i {
    color: white;
}

.card h4 {
    color: white;
}

/* Buttons */
.btn-primary {
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    border: none;
    border-radius: 10px;
}

.btn-success {
    background: linear-gradient(135deg, #00c9a7, #00b4d8);
    border: none;
    border-radius: 10px;
}

.btn:hover {
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-dark">
  <span class="navbar-brand">
    <i class="fa-solid fa-file"></i> QP Generator
  </span>

  <div class="ms-auto">
    <a class="text-white me-3" href="/">Home</a>
    <a class="text-white me-3" href="/input">Generate</a>
    <a class="text-white me-3" href="/templates">Templates</a>
    <a class="text-white" href="/history">History</a>
  </div>
</nav>

<!-- ✅ CENTERED CONTENT -->
<div class="main-content">

<h2 class="mb-4">
<i class="fa-solid fa-sliders"></i> Choose Input Method
</h2>

<div class="cards">

<!-- Manual Entry -->
<div class="card text-center">
<i class="fa-solid fa-keyboard fa-2x mb-3"></i>
<h4>Manual Entry</h4>

<form action="/input_method" method="POST">
<input type="hidden" name="method" value="manual">
<button class="btn btn-primary mt-3 w-100">
<i class="fa-solid fa-pen"></i> Select
</button>
</form>
</div>

<!-- Upload -->
<div class="card text-center">
<i class="fa-solid fa-upload fa-2x mb-3"></i>
<h4>Upload Questions</h4>

<form action="/input_method" method="POST">
<input type="hidden" name="method" value="upload">
<button class="btn btn-success mt-3 w-100">
<i class="fa-solid fa-cloud-upload-alt"></i> Select
</button>
</form>
</div>

</div>

</div>

</body>
</html>
