<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}
.card {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 15px;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4">
  <span class="navbar-brand">
    <i class="fa-solid fa-file"></i> QP Generator
  </span>

  <div class="ms-auto">
    <a class="text-white me-3" href="/">Home</a>
    <a class="text-white me-3" href="/input">Generate</a>
    <a class="text-white me-3" href="/templates">Templates</a>
    <a class="text-white" href="/history">History</a>
  </div>
</nav>    

<div class="container mt-5">

<h2><i class="fa-solid fa-clock"></i> Generated Papers</h2>

{% for file in files %}
<div class="card mt-3">
    <a href="{{ file }}" class="text-white">{{ file }}</a>
</div>
{% endfor %}

</div>

</body>
</html>
