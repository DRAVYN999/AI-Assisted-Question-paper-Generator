<!DOCTYPE html>
<html>
<head>
<title>Upload Questions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    margin: 0;
}

/* Navbar */
.navbar {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
}

.navbar a {
    text-decoration: none;
}

.navbar a:hover {
    opacity: 0.7;
}

/* Center content */
.main-content {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
    flex-direction: column;
    text-align: center;
    animation: fadeIn 1s ease-in;
}

/* Upload Card */
.card-box {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    padding: 30px;
    width: 400px;
    max-width: 90%;
}

/* Button */
.btn-success {
    background: linear-gradient(135deg, #00c9a7, #00b4d8);
    border: none;
    border-radius: 10px;
}

.btn:hover {
    transform: scale(1.05);
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-dark">
  <span class="navbar-brand">
    <i class="fa-solid fa-file"></i> QP Generator
  </span>

  <div class="ms-auto">
    <a class="text-white me-3" href="/">Home</a>
    <a class="text-white me-3" href="/input">Generate</a>
    <a class="text-white me-3" href="/templates">Templates</a>
    <a class="text-white" href="/history">History</a>
  </div>
</nav>

<!-- ✅ CENTERED CONTENT -->
<div class="main-content">

<h2 class="mb-4">
<i class="fa-solid fa-cloud-upload-alt"></i> Upload Question Bank
</h2>

<div class="card-box">

<form action="/process_upload" method="POST" enctype="multipart/form-data">

<input type="file" name="question_bank" class="form-control mb-3">

<button class="btn btn-success w-100">
Generate Paper
</button>

</form>

</div>

</div>

</body>
</html>
