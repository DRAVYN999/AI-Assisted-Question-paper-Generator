<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        .card {
            border-radius: 15px;
        }

        .btn-custom {
            border-radius: 10px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Admin Dashboard</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<!-- 🔹 Main Content -->
<div class="container text-center mt-5">

    <h1 class="mb-3">Welcome Admin 👋</h1>
    <p class="mb-4">Your system is secure and running.</p>

    <!-- 🔹 Cards Section -->
    <div class="row justify-content-center">

        <!-- Main App -->
        <div class="col-md-3">
            <div class="card text-dark p-3 mb-4 shadow">
                <h5>Open App</h5>
                <p>Generate question papers</p>
                <a href="/" class="btn btn-primary btn-custom">Go to Main App</a>
            </div>
        </div>

        <!-- Upload -->
        <div class="col-md-3">
            <div class="card text-dark p-3 mb-4 shadow">
                <h5>Upload Questions</h5>
                <p>Upload your question bank</p>
                <a href="/upload" class="btn btn-success btn-custom">Upload</a>
            </div>
        </div>

        <!-- History -->
        <div class="col-md-3">
            <div class="card text-dark p-3 mb-4 shadow">
                <h5>View History</h5>
                <p>See generated papers</p>
                <a href="/history" class="btn btn-warning btn-custom">View</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
